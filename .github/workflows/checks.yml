# GitHub Actions Workflow for seiler-2026-theme
# Generated by @seilerinstrument/wp-build-tools
# Project type: theme

name: Checks

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    strategy:
      matrix:
        php-version: ['8.0', '8.1', '8.2']

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none

      - name: Configure npm registry
        run: |
          echo "@seilerinstrument:registry=https://npm.pkg.github.com" >> .npmrc
          echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> .npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist
        working-directory: src

      - name: Install dependencies
        run: bun install

      - name: Run PHP syntax check
        run: find src -name "*.php" -not -path "*/vendor/*" -exec php -l {} \;

      - name: Run PHPCS
        run: bunx seiler-phpcs src
        continue-on-error: true

      - name: Run PHPUnit
        run: bunx seiler-phpunit --testdox
        if: hashFiles('src/phpunit.xml') != '' || hashFiles('src/phpunit.xml.dist') != ''

      - name: Validate build
        run: bunx seiler-validate-build

  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Configure npm registry
        run: |
          echo "@seilerinstrument:registry=https://npm.pkg.github.com" >> .npmrc
          echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> .npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun test
        if: hashFiles('tests/**/*.test.js') != ''
